<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Essence - AI Summarizer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        /* Premium Light Mode */
        --bg-body: linear-gradient(135deg, #f0f2f5 0%, #e4e7eb 100%);
        --bg-surface: #ffffff;
        --text-main: #18181b;
        --text-muted: #71717a;
        --border-color: rgba(0, 0, 0, 0.08);
        
        --btn-primary-bg: linear-gradient(180deg, #27272a, #18181b);
        --btn-primary-text: #ffffff;
        --btn-primary-shadow: 0 4px 12px rgba(24, 24, 27, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.15);
        
        --btn-secondary-bg: #ffffff;
        --btn-secondary-hover: #f4f4f5;
        
        --surface-shadow: 0 8px 24px -4px rgba(0, 0, 0, 0.05), 0 2px 6px -2px rgba(0, 0, 0, 0.03);
        
        --radius: 12px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark {
        /* Sleek Obsidian Dark Mode */
        --bg-body: linear-gradient(135deg, #121214 0%, #09090b 100%);
        --bg-surface: #18181b;
        --text-main: #f4f4f5;
        --text-muted: #a1a1aa;
        --border-color: rgba(255, 255, 255, 0.1);
        
        --btn-primary-bg: linear-gradient(180deg, #f4f4f5, #d4d4d8);
        --btn-primary-text: #09090b;
        --btn-primary-shadow: 0 4px 12px rgba(255, 255, 255, 0.1), inset 0 -1px 1px rgba(0, 0, 0, 0.1);
        
        --btn-secondary-bg: #27272a;
        --btn-secondary-hover: #3f3f46;
        
        --surface-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        width: 340px;
        padding: 18px; /* Restored original compact padding */
        font-family: 'Inter', sans-serif;
        background: var(--bg-body);
        color: var(--text-main);
        transition: all var(--transition);
        /* Removed min-height entirely so it fits the content dynamically */
    }

    .container {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    /* ---------- Header ---------- */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .logo {
        width: 46px;
        height: 46px;
        border-radius: 10px;
        object-fit: cover;
        box-shadow: var(--surface-shadow);
        border: 1px solid var(--border-color);
    }

    .title h2 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--text-main);
    }

    .title p {
        font-size: 12px;
        font-weight: 500;
        color: var(--text-muted);
        margin-top: 1px;
    }

    #theme-toggle {
        width: 40px;
        height: 40px;
        border: 1px solid var(--border-color);
        border-radius: 10px;
        background: var(--bg-surface);
        box-shadow: var(--surface-shadow);
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        color: var(--text-main);
    }

    #theme-toggle:hover {
        transform: translateY(-2px);
        background: var(--btn-secondary-hover);
    }

    /* ---------- Select ---------- */
    select {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border-color);
        outline: none;
        border-radius: var(--radius);
        background: var(--bg-surface);
        color: var(--text-main);
        font-size: 13px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        box-shadow: var(--surface-shadow);
        transition: var(--transition);
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2371717A%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 14px top 50%;
        background-size: 10px auto;
    }

    select:hover {
        transform: translateY(-1px);
    }

    /* ---------- Buttons ---------- */
    .buttons {
        display: flex;
        gap: 12px;
    }

    button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        transition: var(--transition);
    }

    #summarize {
        background: var(--btn-primary-bg);
        color: var(--btn-primary-text);
        box-shadow: var(--btn-primary-shadow);
    }

    #summarize:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
    }

    #copy-btn {
        background: var(--btn-secondary-bg);
        color: var(--text-main);
        border: 1px solid var(--border-color);
        box-shadow: var(--surface-shadow);
    }

    #copy-btn:hover {
        transform: translateY(-2px);
        background: var(--btn-secondary-hover);
    }

    /* ---------- Result ---------- */
    #result {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        padding: 16px;
        font-size: 13px;
        line-height: 1.6;
        white-space: pre-wrap;
        max-height: 220px;
        overflow-y: auto;
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    #result::-webkit-scrollbar {
        width: 6px;
    }

    #result::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 10px;
    }

    .footer {
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-muted);
        margin-top: 4px;
    }
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <div class="brand">
            <img src="essence_icon.png" class="logo" alt="Essence Logo">
            <div class="title">
                <h2>Essence</h2>
                <p>Your AI Reading Companion 🐾</p>
            </div>
        </div>
        <button id="theme-toggle">🌙</button>
    </div>

    <select id="summary-type">
        <option value="concise">✨ Concise</option>
        <option value="detailed">📖 Detailed</option>
        <option value="bullets">📌 Bullet Points</option>
    </select>

    <div class="buttons">
        <button id="summarize">Summarize</button>
        <button id="copy-btn">Copy</button>
    </div>

    <pre id="result">🐱 Hi! I'm ready to summarize this page for you.</pre>

    <div class="footer">
        Made with ❤️ by Shrey
    </div>
</div>

<script src="popup.js"></script>

</body>
</html>
